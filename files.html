<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Files — EtherMap</title>
<style>
:root {
  --base:#191724; --surface:#1f1d2e; --overlay:#26233a; --glass:rgba(224,222,244,0.08);
  --muted:#908caa; --subtle:#9f9ab8; --text:#e0def4;
  --love:#eb6f92; --gold:#f6c177; --rose:#ebbcba; --pine:#31748f; --foam:#9ccfd8;
}
[data-theme="light"] {
  --base:#faf4ed; --surface:#fffaf6; --overlay:#f2e9e1; --glass:rgba(43,36,48,0.05);
  --muted:#6e6a86; --subtle:#797593; --text:#575279;
  --love:#b4637a; --gold:#ea9d34; --rose:#d7827e; --pine:#286983; --foam:#56949f;
}
html,body{height:100%;margin:0;background:var(--base);font-family:Inter,system-ui,sans-serif;color:var(--text);transition: background 0.3s, color 0.3s;}
.topnav{position:fixed;left:0;right:0;top:0;padding:12px 20px;background:var(--overlay);display:flex;align-items:center;z-index:10;border-bottom:1px solid var(--glass)}
.topnav a{margin-left:14px;text-decoration:none;color:var(--pine);font-weight:700}
.topnav a.active { color:var(--rose); }
.theme-toggle { margin-left:14px; cursor:pointer; font-size:18px; user-select:none; }

.container{padding:120px 20px 40px;display:flex;justify-content:center}
.card{width:900px;background:var(--surface);padding:24px;border-radius:0;border:1px solid var(--glass);box-shadow:none}
h1{color:var(--pine);text-align:left;margin:0 0 14px 0}
.table{margin-top:12px;border-radius:0;overflow:hidden;background:var(--overlay);border:1px solid var(--glass)}
.row{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--glass);align-items:center}
.row:last-child{border-bottom:none}
.filename{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:12px}
.filename a{color:var(--foam);text-decoration:none}
.filename a:hover{text-decoration:underline}
.meta{width:180px;text-align:right;color:var(--muted);font-size:0.95rem}
.actions{width:360px;text-align:right}
.btn{display:inline-block;background:var(--pine);color:var(--text);border:1px solid var(--glass);padding:8px 10px;border-radius:0;cursor:pointer;margin-left:8px;text-decoration:none}
.btn:hover{background:var(--foam);color:var(--base)}
.small{color:var(--muted);font-size:0.9rem}
.footer{margin-top:18px;text-align:center}
</style>
</head>
<body data-theme="dark">
<nav class="topnav">
  <div style="font-weight:700;color:var(--pine)">EtherMap</div>
  <div style="margin-left:auto; display:flex; align-items:center;">
    <a href="/">Visualization</a>
    <a href="/upload">Upload</a>
    <a href="/files" class="active">Files</a>
    <a href="#" id="logout">Logout</a>
    <span class="theme-toggle" id="themeToggle" title="Toggle Theme">🌓</span>
  </div>
</nav>

<main class="container">
  <div class="card">
    <h1>Archive</h1>
    <div id="status" class="small" style="margin-bottom:10px;"></div>
    <div id="filesArea" class="table">
      <div style="padding:14px" class="small">Synchronizing index…</div>
    </div>

    <div class="footer">
      <button id="refresh" class="btn">Refresh Index</button>
    </div>
  </div>
</main>

<script>
function setupTheme(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').onclick = () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  };
}
setupTheme();

async function fetchJson(url, opts){ const r = await fetch(url, Object.assign({credentials:'include'}, opts||{})); if(!r.ok) throw new Error('Server: '+r.status); return r.json(); }
function setStatus(msg, isError){
  const el = document.getElementById('status');
  el.textContent = msg || '';
  el.style.color = isError ? 'var(--rose)' : 'var(--muted)';
}

function mkRow(file){
  const div = document.createElement('div');
  div.className = 'row';

  const name = document.createElement('div');
  name.className = 'filename';
  const a = document.createElement('a');
  a.href = '/files/' + encodeURIComponent(file.name);
  a.textContent = file.name;
  name.appendChild(a);

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `${file.size_h || '?'} &nbsp; ${file.mtime_s || ''}`;

  const acts = document.createElement('div');
  acts.className = 'actions';

  const dl = document.createElement('a');
  dl.href = '/files/' + encodeURIComponent(file.name);
  dl.className = 'btn';
  dl.textContent = 'Download';

  const tbtn = document.createElement('button');
  tbtn.className = 'btn';
  tbtn.textContent = 'Temp link';
  tbtn.addEventListener('click', async ()=>{
    tbtn.disabled = true;
    tbtn.textContent = 'Generating…';
    try{
      const res = await fetchJson('/api/files/temp', {method:'POST', body: JSON.stringify({name: file.name, ttl: 300}), headers: {'Content-Type':'application/json'}});
      if(res.ok && res.url){ window.open(res.url, '_blank'); tbtn.textContent = 'Opened'; setStatus('Temporary download link created.', false); }
      else { setStatus('Could not create temporary link.', true); tbtn.textContent = 'Temp link'; }
    }catch(err){ setStatus('Error creating temporary link: '+err.message, true); tbtn.textContent = 'Temp link'; }
    tbtn.disabled = false;
  });

  acts.appendChild(dl);
  acts.appendChild(tbtn);
  const rbtn = document.createElement('button');
  rbtn.className = 'btn';
  rbtn.textContent = 'Rename';
  rbtn.addEventListener('click', async ()=>{
    const next = prompt('Rename file to:', file.name);
    if(!next || next === file.name) return;
    try{
      const res = await fetchJson('/api/files/rename', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({old_name:file.name,new_name:next})});
      if(res.ok){ setStatus(`Renamed ${file.name} → ${next}`, false); loadFiles(); }
      else setStatus('Rename failed.', true);
    }catch(err){ setStatus('Rename failed: '+err.message, true); }
  });
  const xbtn = document.createElement('button');
  xbtn.className = 'btn';
  xbtn.textContent = 'Delete';
  xbtn.addEventListener('click', async ()=>{
    if(!confirm(`Delete ${file.name}?`)) return;
    try{
      const res = await fetchJson('/api/files/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:file.name})});
      if(res.ok){ setStatus(`Deleted ${file.name}`, false); loadFiles(); }
      else setStatus('Delete failed.', true);
    }catch(err){ setStatus('Delete failed: '+err.message, true); }
  });
  acts.appendChild(rbtn);
  acts.appendChild(xbtn);

  div.appendChild(name);
  div.appendChild(meta);
  div.appendChild(acts);
  return div;
}

async function loadFiles(){
  const area = document.getElementById('filesArea');
  area.innerHTML = '<div style="padding:14px" class="small">Synchronizing index…</div>';
  try{
    const j = await fetchJson('/api/files');
    if(!j.ok){ area.innerHTML = '<div style="padding:14px" class="small">Server error</div>'; return; }
    if(!j.files || !j.files.length){ area.innerHTML = '<div style="padding:14px" class="small">No files available</div>'; setStatus('No archived files found.', false); return; }
    area.innerHTML = '';
    j.files.forEach(f => area.appendChild(mkRow(f)));
    setStatus(`Index synchronized: ${j.files.length} record(s).`, false);
  }catch(e){ area.innerHTML = '<div style="padding:14px" class="small">Error: '+(e.message||e)+'</div>'; setStatus('Synchronization failed.', true); }
}

document.getElementById('refresh').addEventListener('click', loadFiles);
document.getElementById('logout').addEventListener('click', async (e) => { e.preventDefault(); try{ await fetch('/api/auth/logout', {method:'POST', credentials:'include'}); }catch{}; window.location.href='/login';});

loadFiles();
</script>
</body>
</html>
