<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Upload — EtherMap</title>
<style>
:root{--base:#191724;--overlay:#26233a;--surface:#1f1d2e;--muted:#908caa;--pine:#31748f;--foam:#9ccfd8;--rose:#ebbcba;--text:#e0def4;--glass:rgba(224,222,244,0.08)}
html,body{height:100%;margin:0;background:var(--base);font-family:Inter,system-ui,sans-serif;color:var(--text)}
.topnav{position:fixed;left:0;right:0;top:0;padding:12px 48px 12px 20px;background:var(--overlay);display:flex;align-items:center;z-index:10;border-bottom:1px solid var(--glass)}
.topnav a{margin-left:14px;text-decoration:none;color:var(--pine);font-weight:700}
.container{padding:90px 20px 40px;display:flex;justify-content:center}
.card{width:720px;background:var(--surface);padding:36px;border-radius:0;border:1px solid var(--glass);box-shadow:none}
h1{color:var(--rose);text-align:center;margin:0 0 18px 0}
.form-row{display:flex;justify-content:center;margin:16px 0}
input[type=file]{padding:8px;border-radius:0;background:var(--overlay);border:1px solid var(--glass);color:var(--text)}
button{background:var(--pine);color:var(--text);border:1px solid var(--glass);padding:10px 18px;border-radius:0;cursor:pointer;font-weight:700}
button:hover{background:var(--foam);color:var(--base)}
.progress{height:14px;background:var(--overlay);border:1px solid var(--glass);border-radius:0;margin-top:18px;overflow:hidden}
.progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--foam),var(--pine));border-radius:0}
.footer{margin-top:18px;text-align:center}
.link{display:block;text-align:center;margin-top:14px;color:var(--pine);text-decoration:none}
</style>
</head>
<body>
<nav class="topnav">
  <div style="font-weight:700;color:var(--pine)">EtherMap</div>
  <div style="margin-left:auto">
    <a href="/">Visualization</a>
    <a href="/upload" style="color:var(--rose)">Upload</a>
    <a href="/files">Files</a>
    <a href="#" id="logout">Logout</a>
  </div>
</nav>

<main class="container">
  <div class="card">
    <h1>Upload a File to the Network Server</h1>
    <div style="text-align:center;color:var(--muted);">Files uploaded here will be logged as events so nodes appear in the visualization.</div>

    <div style="display:flex;justify-content:center;margin-top:22px;">
      <input id="fileInput" type="file" />
    </div>

    <div class="form-row">
      <button id="uploadBtn">Upload</button>
    </div>

    <div class="progress" aria-hidden="true"><i id="bar"></i></div>
    <div id="status" style="margin-top:10px;text-align:center;color:var(--muted);font-size:0.95rem;"></div>

    <div class="footer">
      <a class="link" href="/">← Back to Visualization</a>
    </div>
  </div>
</main>

<script>
function getClientId(){ try{ let id=localStorage.getItem('client_id'); if(!id){ id = Math.random().toString(36).slice(2,10) + '-' + Date.now().toString(36).slice(-6); localStorage.setItem('client_id', id);} return id;}catch(e){return 'anon-'+Date.now();}}

const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const bar = document.getElementById('bar');
const statusEl = document.getElementById('status');

function setStatus(msg, isError){
  statusEl.textContent = msg || '';
  statusEl.style.color = isError ? 'var(--rose)' : 'var(--muted)';
}

uploadBtn.addEventListener('click', () => {
  const f = fileInput.files[0];
  if(!f){ setStatus('Choose a file first.', true); return; }
  const client_id = getClientId();
  const form = new FormData();
  form.append('file', f);
  form.append('client_id', client_id);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/upload', true);
  xhr.withCredentials = true;
  uploadBtn.disabled = true;
  setStatus('Uploading…', false);
  xhr.upload.onprogress = (e) => {
    if(e.lengthComputable){ const pct = Math.round((e.loaded / e.total) * 100); bar.style.width = pct + '%'; }
  };
  xhr.onload = () => {
    uploadBtn.disabled = false;
    if(xhr.status >= 200 && xhr.status < 300){ setStatus('Upload complete.', false); bar.style.width = '100%'; setTimeout(()=>bar.style.width='0%',600); }
    else { setStatus('Upload failed: ' + (xhr.statusText || xhr.status), true); }
  };
  xhr.onerror = () => { uploadBtn.disabled = false; setStatus('Upload error. Check server connection.', true); };
  xhr.send(form);
});

document.getElementById('logout').addEventListener('click', async (e) => { e.preventDefault(); try{ await fetch('/logout', {method:'POST', credentials:'include'}); }catch{}; window.location.href='/login';});
</script>
</body>
</html>
