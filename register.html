<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Register — EtherMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --base:#191724; --surface:#1f1d2e; --overlay:#26233a;
  --muted:#908caa; --subtle:#9f9ab8; --text:#e0def4;
  --rose:#ebbcba; --pine:#31748f; --foam:#9ccfd8; --gold:#f6c177; --glass:rgba(224,222,244,0.08);
}

html, body {
  height:100vh; margin:0; background:var(--base);
  font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased;
}

.center {
  height:100vh; display:flex; align-items:center; justify-content:center;
}

.card {
  width:360px; background:var(--surface); padding:28px;
  border-radius:0; box-shadow:none;
  border:1px solid var(--glass);
}

h2 { margin:0 0 14px 0; color:var(--pine); font-size:22px; }
label { display:block; margin-top:14px; font-size:13px; color:var(--subtle); }
input[type=text], input[type=password] {
  width:100%; padding:10px; margin-top:6px;
  border-radius:0; border:1px solid var(--glass);
  background:var(--overlay); color:var(--text); font-size:14px;
}

button {
  margin-top:20px; width:100%; padding:12px;
  background:var(--foam); color:var(--base);
  border:1px solid var(--glass); border-radius:0; font-weight:700; cursor:pointer;
  box-shadow:none; font-size:15px;
}
button:hover { background:var(--pine); color:var(--text); }

a {
  display:block; margin-top:14px; text-align:center;
  font-size:13px; color:var(--pine); text-decoration:none; font-weight:600;
}
</style>
</head>

<body>
<div class="center">
  <div class="card">
    <h2>Create account</h2>

    <label>Username</label>
    <input id="username" type="text">

    <label>Password</label>
    <input id="password" type="password">

    <button id="regBtn">Register</button>

    <a href="/login">Already have an account?</a>
    <a href="/">← Back to visualization</a>

    <div id="err" style="margin-top:10px; font-size:13px; color:var(--rose); display:none;"></div>
  </div>
</div>

<script>
function err(msg){
  const e=document.getElementById('err');
  e.textContent=msg;
  e.style.display='block';
}
function clearErr(){
  const e=document.getElementById('err');
  e.textContent='';
  e.style.display='none';
}

document.getElementById('regBtn').onclick = async () => {
  const btn = document.getElementById('regBtn');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  if(!u || !p) return err("Please fill all fields.");
  clearErr();
  btn.disabled = true;
  btn.textContent = "Registering…";

  try{
    const r = await fetch("/register", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username:u, password:p }),
      credentials:"include"
    });
    const j = await r.json();

    if(j.ok){
      location.href = "/login";
    } else {
      err(j.error || "Registration failed.");
      btn.disabled = false;
      btn.textContent = "Register";
    }
  } catch(e2){
    err("Network error.");
    btn.disabled = false;
    btn.textContent = "Register";
  }
};
</script>
</body>
</html>
