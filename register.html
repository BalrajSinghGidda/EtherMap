<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Register — EtherMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --base:#191724; --surface:#1f1d2e; --overlay:#26233a;
  --muted:#908caa; --subtle:#9f9ab8; --text:#e0def4;
  --rose:#ebbcba; --pine:#31748f; --foam:#9ccfd8; --gold:#f6c177; --glass:rgba(224,222,244,0.08);
}
[data-theme="light"] {
  --base:#faf4ed; --surface:#fffaf6; --overlay:#f2e9e1; --glass:rgba(43,36,48,0.05);
  --muted:#6e6a86; --subtle:#797593; --text:#575279;
  --love:#b4637a; --gold:#ea9d34; --rose:#d7827e; --pine:#286983; --foam:#56949f;
}

html, body {
  height:100vh; margin:0; background:var(--base); color:var(--text);
  font-family:Inter,system-ui,sans-serif; transition: background 0.3s, color 0.3s;
  overflow: hidden;
}

.bg-nodes {
  position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
  background: radial-gradient(circle at 70% 20%, var(--glass) 0%, transparent 40%),
              radial-gradient(circle at 30% 80%, var(--glass) 0%, transparent 40%);
}

.center {
  height:100vh; display:flex; align-items:center; justify-content:center;
}

.card {
  width:380px; background:var(--surface); padding:40px;
  border-radius:0; border:1px solid var(--glass);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  position: relative;
}

.theme-toggle {
  position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; opacity: 0.6;
}
.theme-toggle:hover { opacity: 1; }

.logo {
  font-size: 32px; font-weight: 900; color: var(--rose); margin-bottom: 8px; text-align: center;
  letter-spacing: -1px;
}

h2 { margin:0 0 24px 0; color:var(--text); font-size:18px; text-align: center; font-weight: 500; opacity: 0.8; }
label { display:block; margin-top:16px; font-size:12px; font-weight: 700; color:var(--muted); text-transform: uppercase; letter-spacing: 1px; }

input[type=text], input[type=password] {
  width:100%; padding:12px; margin-top:8px; box-sizing: border-box;
  border-radius:0; border:1px solid var(--glass);
  background:var(--overlay); color:var(--text); font-size:15px;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--rose); }

button {
  margin-top:30px; width:100%; padding:14px;
  background:var(--rose); color:var(--base);
  border:none; font-weight:800; cursor:pointer;
  font-size:15px; text-transform: uppercase; letter-spacing: 1px;
  transition: transform 0.1s, opacity 0.2s;
}
button:hover { opacity: 0.9; }
button:active { transform: scale(0.98); }

.links { margin-top:24px; text-align:center; display: flex; flex-direction: column; gap: 10px; }
.links a {
  font-size:13px; color:var(--muted); text-decoration:none; font-weight:600; transition: color 0.2s;
}
.links a:hover { color: var(--pine); }

#err { margin-top:20px; font-size:13px; color:var(--rose); text-align: center; min-height: 1.2em; }
</style>
</head>

<body data-theme="dark">
<div class="bg-nodes"></div>
<div class="center">
  <div class="card">
    <span class="theme-toggle" id="themeToggle" title="Toggle Theme">🌓</span>
    <div class="logo">EtherMap</div>
    <h2>Join the network topology.</h2>

    <label>New Username</label>
    <input id="username" type="text" spellcheck="false" autocomplete="username">

    <label>Secure Password</label>
    <input id="password" type="password" autocomplete="new-password">

    <div id="err"></div>

    <button id="regBtn">Create Identity</button>

    <div class="links">
      <a href="/login">Already identified? Log in</a>
      <a href="/">← Back to monitoring</a>
    </div>
  </div>
</div>

<script>
function setupTheme(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').onclick = () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  };
}
setupTheme();

function err(msg){
  const e=document.getElementById('err');
  e.textContent=msg;
}

document.getElementById('regBtn').onclick = async () => {
  const btn = document.getElementById('regBtn');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  if(!u || !p) return err("All fields are mandatory.");
  err("");
  btn.disabled = true;
  btn.textContent = "Initializing…";

  try{
    const r = await fetch("/api/auth/register", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username:u, password:p }),
      credentials:"include"
    });
    const j = await r.json();

    if(j.ok){
      location.href = "/login";
    } else {
      err(j.error || "Identity creation failed.");
      btn.disabled = false;
      btn.textContent = "Create Identity";
    }
  } catch(e2){
    err("Transmission error.");
    btn.disabled = false;
    btn.textContent = "Create Identity";
  }
};
</script>
</body>
</html>
