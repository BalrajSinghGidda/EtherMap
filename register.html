<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Register — EtherMap</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --base:#0a1220; --surface:#131b2b; --overlay:#1c2436; --glass:rgba(240,242,245,0.08);
  --muted:#555c65; --subtle:#b8b8b6; --text:#f0f2f5;
  --love:#e06b58; --gold:#b8b5a2; --rose:#e48b7a; --pine:#889889; --foam:#d0cac7;
}
[data-theme="light"] {
  --base:#f0f2f5; --surface:#ffffff; --overlay:#e2e4e9; --glass:rgba(10,18,32,0.05);
  --muted:#555c65; --subtle:#7a8a7d; --text:#0a1220;
  --love:#e06b58; --gold:#b8b5a2; --rose:#d4786b; --pine:#7a8a7d; --foam:#555c65;
}

html, body {
  height:100vh; margin:0; background:var(--base); color:var(--text);
  font-family:Inter,system-ui,sans-serif; transition: background 0.3s, color 0.3s;
  overflow: hidden;
}

.bg-nodes {
  position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
  background: radial-gradient(circle at 70% 20%, var(--glass) 0%, transparent 40%),
              radial-gradient(circle at 30% 80%, var(--glass) 0%, transparent 40%);
}

.center {
  height:100vh; display:flex; align-items:center; justify-content:center;
}

.card {
  width:380px; background:var(--surface); padding:40px;
  border-radius:0; border:1px solid var(--glass);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  position: relative;
}

.theme-toggle {
  position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; opacity: 0.6; color: var(--subtle);
}
.theme-toggle:hover { opacity: 1; color: var(--text); }

.logo {
  font-size: 32px; font-weight: 900; color: var(--rose); margin-bottom: 8px; text-align: center;
  letter-spacing: -1px;
}

h2 { margin:0 0 24px 0; color:var(--text); font-size:18px; text-align: center; font-weight: 500; opacity: 0.8; }
label { display:block; margin-top:16px; font-size:11px; font-weight: 700; color:var(--muted); text-transform: uppercase; letter-spacing: 1px; }

input[type=text], input[type=password] {
  width:100%; padding:12px; margin-top:8px; box-sizing: border-box;
  border-radius:0; border:1px solid var(--glass);
  background:var(--overlay); color:var(--text); font-size:15px;
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--rose); }

.strength-meter {
  height: 4px; background: var(--glass); margin-top: 8px; width: 100%;
}
.strength-bar {
  height: 100%; width: 0%; transition: width 0.3s, background 0.3s;
}

button {
  margin-top:30px; width:100%; padding:14px;
  background:var(--rose); color:var(--base);
  border:none; font-weight:800; cursor:pointer;
  font-size:15px; text-transform: uppercase; letter-spacing: 1px;
  transition: transform 0.1s, opacity 0.2s;
}
button:hover { opacity: 0.9; }
button:active { transform: scale(0.98); }

.links { margin-top:24px; text-align:center; display: flex; flex-direction: column; gap: 10px; }
.links a {
  font-size:13px; color:var(--muted); text-decoration:none; font-weight:600; transition: color 0.2s;
}
.links a:hover { color: var(--pine); }

#err { margin-top:20px; font-size:13px; color:var(--rose); text-align: center; min-height: 1.2em; }
</style>
</head>

<body data-theme="dark">
<div class="bg-nodes"></div>
<div class="center">
  <div class="card">
    <span class="theme-toggle" id="themeToggle" title="Toggle Theme">🌓</span>
    <div class="logo">EtherMap</div>
    <h2>Join the network topology.</h2>

    <label>New Username</label>
    <div style="position:relative">
      <i class="ph-bold ph-user" style="position:absolute; left:12px; top:18px; color:var(--muted)"></i>
      <input id="username" type="text" style="padding-left:38px" spellcheck="false" autocomplete="username">
    </div>

    <label>Secure Password</label>
    <div style="position:relative">
      <i class="ph-bold ph-lock-key" style="position:absolute; left:12px; top:18px; color:var(--muted)"></i>
      <input id="password" type="password" style="padding-left:38px" autocomplete="new-password">
    </div>
    <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>

    <div id="err"></div>

    <button id="regBtn">Create Identity</button>

    <div class="links">
      <a href="/login">Already identified? Log in</a>
      <a href="/">← Back to monitoring</a>
    </div>
  </div>
</div>

<script>
function setupTheme(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').onclick = () => {
    const current = document.body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  };
}
setupTheme();

const passInput = document.getElementById('password');
const strengthBar = document.getElementById('strengthBar');
passInput.oninput = () => {
  const v = passInput.value;
  let score = 0;
  if(v.length > 5) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  
  const width = (score / 4) * 100;
  const colors = ['var(--love)', 'var(--gold)', 'var(--pine)', 'var(--foam)'];
  strengthBar.style.width = width + '%';
  strengthBar.style.background = colors[score-1] || 'var(--love)';
};

function err(msg){
  const e=document.getElementById('err');
  e.textContent=msg;
}

document.getElementById('regBtn').onclick = async () => {
  const btn = document.getElementById('regBtn');
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  if(!u || !p) return err("All fields are mandatory.");
  err("");
  btn.disabled = true;
  btn.textContent = "Initializing…";

  try{
    const r = await fetch("/api/auth/register", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ username:u, password:p }),
      credentials:"include"
    });
    const j = await r.json();

    if(j.ok){
      location.href = "/login";
    } else {
      err(j.error || "Identity creation failed.");
      btn.disabled = false;
      btn.textContent = "Create Identity";
    }
  } catch(e2){
    err("Transmission error.");
    btn.disabled = false;
    btn.textContent = "Create Identity";
  }
};
</script>
</body>
</html>
