<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EtherMap — Live Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --base:#191724; --surface:#1f1d2e; --overlay:#26233a; --glass:rgba(224,222,244,0.08);
    --muted:#908caa; --subtle:#9f9ab8; --text:#e0def4;
    --love:#eb6f92; --gold:#f6c177; --rose:#ebbcba; --pine:#31748f; --foam:#9ccfd8;
  }
  html, body { height:100vh; margin:0; overflow:hidden; }
  body { font-family:Inter,system-ui,sans-serif; background:var(--base); color:var(--text); }
  .topnav { position:fixed; top:0; left:0; right:0; padding:12px 48px 12px 20px; display:flex; align-items:center; background:var(--overlay); border-bottom:1px solid var(--glass); z-index:10; }
  .topnav a { text-decoration:none; color:var(--pine); font-weight:700; margin-left:14px; }
  .topnav a.active { color:var(--rose); }
  .app { display:grid; grid-template-columns: 1fr 420px; gap:12px; height:calc(100vh - 72px); padding:86px 12px 12px; box-sizing:border-box; }
  .card { background:var(--surface); border:1px solid var(--glass); border-radius:0; box-shadow:none; }
  .canvas { display:flex; flex-direction:column; padding:12px; }
  .panel { padding:12px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
  #viz { width:100%; height:100%; min-height:360px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .stat { display:flex; justify-content:space-between; padding:8px; border-radius:0; background:var(--overlay); border:1px solid var(--glass); font-size:13px; }
  .muted { color:var(--muted); font-size:12px; }
  button, input, select { background:var(--overlay); color:var(--text); border:1px solid var(--glass); border-radius:0; padding:6px 8px; }
  button { background:var(--pine); cursor:pointer; font-weight:700; }
  button:hover { background:var(--foam); color:var(--base); }
  #log, #alerts, #chatLog, #devicesList { max-height:180px; overflow:auto; border:1px solid var(--glass); border-radius:0; background:var(--overlay); padding:8px; }
  .device-row { display:flex; justify-content:space-between; align-items:center; padding:6px; border-bottom:1px solid var(--glass); }
  .device-row:last-child { border-bottom:none; }
  .chip { display:inline-block; padding:2px 6px; border-radius:0; background:var(--overlay); border:1px solid var(--glass); font-size:11px; color:var(--muted); }
  .link-passive { stroke: var(--muted); stroke-width:1.5; opacity:.5; }
  .link-active { stroke: var(--rose); stroke-width:3; opacity:.95; }
  .state-connected { fill: var(--foam); }
  .state-transferring { fill: var(--gold); }
  .state-idle { fill: var(--muted); }
  .state-error { fill: var(--love); }
  .node-label { fill: var(--text); font-size:12px; }
  details.section { border:1px solid var(--glass); border-radius:0; background:var(--overlay); }
  details.section > summary { list-style:none; cursor:pointer; padding:8px 10px; font-weight:700; color:var(--subtle); }
  details.section > summary::-webkit-details-marker { display:none; }
  details.section[open] > summary { color:var(--foam); border-bottom:1px solid var(--glass); }
  .section-body { padding:8px; display:flex; flex-direction:column; gap:8px; }
  @media (max-width:1100px){ .app{ grid-template-columns:1fr; } .panel{ max-height:45vh; } }
</style>
</head>
<body>
<nav class="topnav">
  <div style="color:var(--pine);font-weight:800;">EtherMap</div>
  <div style="margin-left:auto;">
    <a href="/" class="active">Visualization</a>
    <a href="/upload">Upload</a>
    <a href="/files">Files</a>
    <a href="/logout" id="logoutLink">Logout</a>
  </div>
</nav>

<div class="app">
  <div class="card canvas">
    <div class="row" style="justify-content:space-between;">
      <div>
        <div style="font-size:20px;font-weight:800;color:var(--pine)">EtherMap — Live</div>
        <div class="muted">Real directed links + timeline replay + alerts</div>
      </div>
      <div>
        <span class="chip">SSE: <span id="conn_status">connecting</span></span>
      </div>
    </div>
    <svg id="viz" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="row">
      <button id="pause">Pause</button>
      <button id="resumeLive">Resume live</button>
      <button id="exportState">Export state</button>
      <label class="chip">Import <input type="file" id="importState" accept="application/json" style="display:none"></label>
      <button id="importBtn">Choose file</button>
    </div>
    <div class="row">
      <span class="muted">Replay:</span>
      <input id="timeline" type="range" min="0" max="0" value="0" style="flex:1">
      <button id="playReplay">Play</button>
      <span class="chip" id="timelineLabel">0 / 0</span>
    </div>
  </div>

  <div class="card panel">
    <div class="stat"><span>Nodes</span><strong id="node_count">0</strong></div>
    <div class="stat"><span>Events</span><strong id="event_count">0</strong></div>
    <div class="stat"><span>Total bytes</span><strong id="bytes_total">0</strong></div>
    <div class="stat"><span>Burst(20s)</span><strong id="burst_20s">0</strong></div>

    <details class="section" open>
      <summary>Devices (profiles)</summary>
      <div class="section-body">
        <div class="row">
          <button id="refreshDevices">Refresh</button>
          <button id="registerDevice">Register this device</button>
        </div>
        <div id="devicesList"></div>
      </div>
    </details>

    <details class="section">
      <summary>Alerts</summary>
      <div class="section-body">
        <div id="alerts"></div>
      </div>
    </details>

    <details class="section">
      <summary>Analytics Top Talkers</summary>
      <div class="section-body">
        <div id="analyticsList" class="muted"></div>
      </div>
    </details>

    <details class="section">
      <summary>Room chat (Signaling)</summary>
      <div class="section-body">
        <div class="row">
          <input id="roomInput" placeholder="room name" value="demo-room" style="flex:1">
          <button id="joinRoom">Join</button>
          <span class="chip" id="roomPresence">0 members</span>
        </div>
        <div id="chatLog"></div>
        <div class="row">
          <input id="chatMsg" placeholder="message" style="flex:1">
          <button id="sendMsg">Send</button>
        </div>
      </div>
    </details>

    <details class="section">
      <summary>Event log</summary>
      <div class="section-body">
        <div id="log"></div>
      </div>
    </details>
    <div id="ui_status" class="muted"></div>
  </div>
</div>

<script>
function generateClientId(){ return Math.random().toString(36).slice(2,8)+'-'+Date.now().toString(36).slice(-6); }
function getClientId(){ try{ let id=localStorage.getItem('client_id'); if(!id){ id=generateClientId(); localStorage.setItem('client_id', id);} return id;}catch(e){return generateClientId();}}
const CLIENT_ID = getClientId();
let CURRENT_USER = null;
let eventsPaused = false;
let replayMode = false;
let replayTimer = null;
const eventHistory = [];
const recentEventTs = [];
const authFailRecent = {};
const alerts = [];
const analytics = { bytes: 0, byDevice: new Map(), burst20: 0 };

function setUiStatus(msg, isErr){
  const el = document.getElementById('ui_status');
  el.textContent = msg || '';
  el.style.color = isErr ? 'var(--love)' : 'var(--muted)';
}

function apiFetch(url, opts){
  opts = opts || {};
  opts.credentials = 'include';
  return fetch(url, opts).then(async r => {
    const ct = r.headers.get('content-type') || '';
    const data = ct.includes('application/json') ? await r.json() : await r.text();
    if(!r.ok) throw data;
    return data;
  });
}

function sendLog(evt){
  fetch('/api/events/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(evt),credentials:'include'}).catch(()=>{});
}

function addAlert(text){
  alerts.unshift({text, ts:new Date().toLocaleTimeString()});
  while(alerts.length>40) alerts.pop();
  const el = document.getElementById('alerts');
  el.innerHTML = alerts.map(a=>`<div style="padding:4px 0;border-bottom:1px solid var(--glass)"><strong style="color:var(--love)">⚠</strong> ${escapeHtml(a.text)} <span class="muted">${a.ts}</span></div>`).join('') || '<span class="muted">No alerts.</span>';
}

function updateTimelineUI(){
  const t = document.getElementById('timeline');
  t.max = Math.max(0, eventHistory.length - 1);
  if(!replayMode) t.value = t.max;
  document.getElementById('timelineLabel').textContent = `${Number(t.value)+1 || 0} / ${eventHistory.length}`;
}

const svgEl = document.getElementById('viz');
let graph = null;
function initViz(){
  const rect = svgEl.getBoundingClientRect();
  const width = Math.max(600, rect.width);
  const height = Math.max(360, rect.height);
  svgEl.innerHTML = '';
  const svg = d3.select(svgEl).attr('viewBox', `0 0 ${width} ${height}`);
  const linkG = svg.append('g');
  const nodeG = svg.append('g');
  const links = [];
  const nodes = [];
  const nodesMap = new Map();
  const linksMap = new Map();
  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide().radius(16))
    .force('link', d3.forceLink(links).id(d=>d.id).distance(140).strength(0.5));

  function redraw(){
    const linkSel = linkG.selectAll('line').data(links, d=>d.id);
    linkSel.join(
      e=>e.append('line').attr('class', d=>d.active ? 'link-active' : 'link-passive'),
      u=>u.attr('class', d=>d.active ? 'link-active' : 'link-passive'),
      x=>x.remove()
    );
    const nodeSel = nodeG.selectAll('g.node').data(nodes, d=>d.id);
    const enter = nodeSel.enter().append('g').attr('class','node').call(
      d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',(e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    );
    enter.append('circle').attr('r', 11);
    enter.append('text').attr('class','node-label').attr('dy',4).attr('text-anchor','middle');
    nodeSel.merge(enter).select('circle').attr('class', d => d.state === 'transferring' ? 'state-transferring' : d.state === 'error' ? 'state-error' : d.state === 'idle' ? 'state-idle' : 'state-connected');
    nodeSel.merge(enter).select('text').text(d=>d.label || d.id);
    nodeSel.exit().remove();
    sim.nodes(nodes).on('tick',()=>{
      linkG.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeG.selectAll('g.node').attr('transform',d=>`translate(${d.x},${d.y})`);
    });
    sim.force('link').links(links);
    sim.alpha(0.7).restart();
    document.getElementById('node_count').textContent = nodes.length;
  }

  function upsertNode(id, label){
    if(!id) return null;
    if(nodesMap.has(id)){ const n = nodesMap.get(id); if(label) n.label = label; return n; }
    const node = {id, label: label || id, state:'connected'};
    nodes.push(node); nodesMap.set(id,node); redraw(); return node;
  }

  function setNodeState(id, state, label){
    const node = upsertNode(id, label);
    if(!node) return;
    node.state = state || 'connected';
    redraw();
  }

  function edgeKey(src, dst, kind){ return `${src}->${dst}:${kind || 'flow'}`; }
  function upsertEdge(src, dst, kind, active){
    if(!src || !dst) return;
    const s = upsertNode(src);
    const t = upsertNode(dst);
    const id = edgeKey(src,dst,kind);
    if(!linksMap.has(id)){
      const edge = {id, source:s, target:t, active: !!active, kind: kind || 'flow'};
      links.push(edge); linksMap.set(id,edge);
    } else {
      linksMap.get(id).active = !!active;
    }
    redraw();
  }

  function removeNode(id){
    if(!id || id === 'SERVER') return;
    if(!nodesMap.has(id)) return;
    const node = nodesMap.get(id);
    const remainingLinks = links.filter(l => l.source !== node && l.target !== node);
    links.splice(0, links.length, ...remainingLinks);
    linksMap.clear();
    links.forEach(l => linksMap.set(l.id, l));
    const remainingNodes = nodes.filter(n => n !== node);
    nodes.splice(0, nodes.length, ...remainingNodes);
    nodesMap.delete(id);
    redraw();
  }

  function resetGraph(){
    links.splice(0, links.length);
    nodes.splice(0, nodes.length);
    linksMap.clear();
    nodesMap.clear();
    upsertNode('SERVER', 'SERVER');
    redraw();
  }

  graph = {upsertNode, setNodeState, upsertEdge, removeNode, resetGraph};
  upsertNode('SERVER','SERVER');
}
initViz();
window.addEventListener('resize', ()=>initViz());

function addLog(type, detail){
  const el = document.getElementById('log');
  const row = document.createElement('div');
  row.textContent = `${type} ${JSON.stringify(detail || {})}`;
  el.prepend(row);
  while(el.childNodes.length > 300) el.removeChild(el.lastChild);
  document.getElementById('event_count').textContent = eventHistory.length;
}

function updateAnalyticsDevice(id, bytes){
  if(!id) return;
  if(!analytics.byDevice.has(id)) analytics.byDevice.set(id,{events:0,bytes:0});
  const v = analytics.byDevice.get(id);
  v.events += 1;
  v.bytes += Number(bytes || 0);
}

function renderAnalytics(){
  const list = [...analytics.byDevice.entries()].map(([id,v])=>({id,...v})).sort((a,b)=>b.bytes-a.bytes || b.events-a.events).slice(0,8);
  document.getElementById('analyticsList').innerHTML = list.map(x=>`<div style="padding:4px 0;border-bottom:1px solid var(--glass)"><strong>${escapeHtml(x.id)}</strong> <span class="muted">${x.events} events · ${x.bytes} bytes</span></div>`).join('') || '<span class="muted">No analytics yet.</span>';
  document.getElementById('bytes_total').textContent = analytics.bytes;
  document.getElementById('burst_20s').textContent = analytics.burst20;
}

function resetDerivedState(){
  analytics.bytes = 0;
  analytics.byDevice.clear();
  recentEventTs.length = 0;
  Object.keys(authFailRecent).forEach(k=>delete authFailRecent[k]);
  alerts.length = 0;
  document.getElementById('alerts').innerHTML = '<span class="muted">No alerts.</span>';
}

function resetLiveView(){
  replayMode = false;
  eventsPaused = false;
  if(replayTimer){ clearInterval(replayTimer); replayTimer = null; }
  eventHistory.length = 0;
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';
  graph.resetGraph();
  resetDerivedState();
  updateTimelineUI();
  document.getElementById('pause').textContent = 'Pause';
}

function handleRules(evt){
  const t = evt.type;
  const d = evt.detail || {};
  const now = Date.now();
  recentEventTs.push(now);
  while(recentEventTs.length && now - recentEventTs[0] > 10000) recentEventTs.shift();
  analytics.burst20 = recentEventTs.filter(ts=>now-ts<=20000).length;
  if(recentEventTs.length >= 25) addAlert(`Burst traffic detected: ${recentEventTs.length} events in 10s`);
  if(t === 'error' || t === 'transfer_failed') addAlert(`Transfer failure from ${d.ip || d.src || 'unknown'}`);
  if(t === 'auth_failed'){
    const ip = d.ip || 'unknown';
    authFailRecent[ip] = authFailRecent[ip] || [];
    authFailRecent[ip].push(now);
    authFailRecent[ip] = authFailRecent[ip].filter(ts=>now-ts<=300000);
    if(authFailRecent[ip].length >= 3) addAlert(`Repeated auth failures from ${ip}`);
  }
}

function applyEvent(evt, record){
  const t = evt.type;
  const d = evt.detail || {};
  const src = d.src || d.ip || d.client_id;
  const dst = d.dst || (t.startsWith('get_') ? src ? 'SERVER' : '' : 'SERVER');
  if(record){
    eventHistory.push(evt);
    if(eventHistory.length > 2000) eventHistory.shift();
    updateTimelineUI();
    addLog(t,d);
  }
  handleRules(evt);
  if(src) graph.upsertNode(src, d.name || d.label || src);
  if(dst) graph.upsertNode(dst, dst);
  if(t === 'put_start' || t === 'get_start'){
    graph.setNodeState(src,'transferring',d.name || src);
    graph.upsertEdge(src, dst || 'SERVER', d.direction || t, true);
  } else if(t === 'put_done' || t === 'get_done'){
    graph.setNodeState(src,'connected',d.name || src);
    graph.upsertEdge(src, dst || 'SERVER', d.direction || t, false);
  } else if(t === 'client_disconnected'){
    graph.setNodeState(src,'idle',d.name || src);
  } else if(t === 'device_removed'){
    graph.removeNode(src);
  } else if(t === 'error'){
    graph.setNodeState(src,'error',d.name || src);
  } else if(t === 'client_connected' || t === 'viewer_connected'){
    graph.setNodeState(src,'connected',d.name || src);
  }
  updateAnalyticsDevice(src, Number(d.size || 0));
  analytics.bytes += Number(d.size || 0);
  renderAnalytics();
}

function replayTo(index){
  replayMode = true;
  graph.resetGraph();
  resetDerivedState();
  const end = Math.max(0, Math.min(index, eventHistory.length - 1));
  for(let i=0;i<=end;i++) applyEvent(eventHistory[i], false);
  document.getElementById('timeline').value = end;
  updateTimelineUI();
}

async function checkAuthOrRedirect(){
  try{
    const me = await apiFetch('/api/auth/me',{method:'GET'});
    if(!me || !me.ok){ location.href = '/login'; return null; }
    CURRENT_USER = me;
    return me;
  } catch(e){ location.href = '/login'; return null; }
}

async function fetchDevices(){
  try{
    const j = await apiFetch('/api/devices/list');
    renderDevices(j.devices || []);
  } catch(e){
    document.getElementById('devicesList').innerHTML = '<div class="muted">Device listing unavailable.</div>';
  }
}

function renderDevices(devs){
  const wrap = document.getElementById('devicesList');
  if(!devs.length){ wrap.innerHTML = '<div class="muted">No devices registered.</div>'; return; }
  wrap.innerHTML = '';
  devs.forEach(d=>{
    const row = document.createElement('div');
    row.className = 'device-row';
    row.innerHTML = `<div>${escapeHtml(d.icon || '💻')} <strong>${escapeHtml(d.name || d.client_id)}</strong><div class="muted">${escapeHtml(d.client_id)} · ${escapeHtml(d.device_type || 'client')}</div></div>`;
    const editBtn = document.createElement('button');
    editBtn.textContent = 'Edit';
    editBtn.onclick = async () => {
      const name = prompt('Device name', d.name || d.client_id);
      if(name === null) return;
      const deviceType = prompt('Device type (client/server/mobile/iot)', d.device_type || 'client');
      if(deviceType === null) return;
      const icon = prompt('Device icon (emoji)', d.icon || '💻');
      if(icon === null) return;
      try{
        await apiFetch('/api/devices/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:d.client_id,name,device_type:deviceType,icon})});
        setUiStatus('Device profile updated.');
        fetchDevices();
      } catch(e){ setUiStatus('Could not update profile.', true); }
    };
    const removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = async () => {
      if(!confirm(`Remove ${d.name || d.client_id}?`)) return;
      try{
        const res = await apiFetch('/api/devices/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:d.client_id})});
        if(res && res.ok){
          setUiStatus('Device removed.');
          graph.removeNode(d.client_id);
          fetchDevices();
        } else {
          setUiStatus('Device not removed.', true);
        }
      } catch(e){
        const msg = (e && e.error) ? e.error : 'Could not remove device.';
        setUiStatus(msg, true);
      }
    };
    row.appendChild(editBtn);
    row.appendChild(removeBtn);
    wrap.appendChild(row);
  });
}

async function autoRegisterDevice(){
  const defaults = {
    client_id: CLIENT_ID,
    name: navigator.platform || CLIENT_ID,
    device_type: /android|iphone/i.test(navigator.userAgent) ? 'mobile' : 'client',
    icon: /android|iphone/i.test(navigator.userAgent) ? '📱' : '💻',
  };
  try{
    await apiFetch('/api/devices/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(defaults)});
    sendLog({type:'client_connected', detail:{ip:CLIENT_ID,src:CLIENT_ID,dst:'SERVER',name:defaults.name,device_type:defaults.device_type,icon:defaults.icon}});
  } catch(e){}
}

async function pullAnalytics(){
  try{
    const a = await apiFetch('/api/analytics');
    if(!a.ok) return;
    document.getElementById('burst_20s').textContent = a.totals.burst_20s;
  } catch(e){}
}

function escapeHtml(s){ return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

function setupSidebarSections(){
  const sections = Array.from(document.querySelectorAll('.panel details.section'));
  sections.forEach((section) => {
    section.addEventListener('toggle', () => {
      if(!section.open) return;
      sections.forEach((other) => {
        if(other !== section) other.open = false;
      });
    });
  });
}

// SSE live feed
const es = new EventSource('/events');
es.onopen = () => { document.getElementById('conn_status').textContent = 'connected'; };
es.onerror = () => { document.getElementById('conn_status').textContent = 'disconnected'; addAlert('SSE disconnected'); };
es.onmessage = (e) => {
  if(eventsPaused || replayMode) return;
  try{ applyEvent(JSON.parse(e.data), true); } catch(err){ addLog('parse_error', {raw:e.data}); }
};

// Timeline controls
document.getElementById('timeline').addEventListener('input', (ev)=> replayTo(Number(ev.target.value)));
document.getElementById('playReplay').addEventListener('click', ()=>{
  if(replayTimer){ clearInterval(replayTimer); replayTimer = null; return; }
  replayMode = true;
  replayTimer = setInterval(()=>{
    const t = document.getElementById('timeline');
    let next = Number(t.value) + 1;
    if(next >= eventHistory.length){ clearInterval(replayTimer); replayTimer = null; return; }
    replayTo(next);
  }, 450);
});
document.getElementById('resumeLive').addEventListener('click', ()=>{
  resetLiveView();
  setUiStatus('Live mode resumed.');
});
document.getElementById('pause').addEventListener('click', (e)=>{
  eventsPaused = !eventsPaused;
  e.target.textContent = eventsPaused ? 'Resume' : 'Pause';
});

// Export / import
document.getElementById('exportState').addEventListener('click', async ()=>{
  try{
    const resp = await apiFetch('/api/state/export');
    const data = JSON.stringify(resp.payload, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ethermap-export-${Date.now()}.json`;
    a.click();
    setUiStatus('State exported.');
  } catch(e){ setUiStatus('Export failed.', true); }
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importState').click());
document.getElementById('importState').addEventListener('change', async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    await apiFetch('/api/state/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payload})});
    setUiStatus('State imported. Reloading...');
    location.reload();
  } catch(e){ setUiStatus('Import failed.', true); }
});

// Devices
document.getElementById('refreshDevices').addEventListener('click', fetchDevices);
document.getElementById('registerDevice').addEventListener('click', async ()=>{
  const name = prompt('Device name', navigator.platform || CLIENT_ID) || CLIENT_ID;
  const device_type = prompt('Device type', 'client') || 'client';
  const icon = prompt('Device icon', '💻') || '💻';
  try{
    await apiFetch('/api/devices/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:CLIENT_ID,name,device_type,icon})});
    sendLog({type:'client_connected',detail:{ip:CLIENT_ID,src:CLIENT_ID,dst:'SERVER',name,device_type,icon}});
    fetchDevices();
  } catch(e){ setUiStatus('Could not register device.', true); }
});

// Rooms / chat
const socket = io(`${location.protocol}//${location.hostname}:5050`, {transports:['websocket','polling']});
let currentRoom = '';
function chatLine(msg){ const el = document.getElementById('chatLog'); const row = document.createElement('div'); row.innerHTML = msg; el.appendChild(row); el.scrollTop = el.scrollHeight; }
socket.on('connect', ()=>chatLine('<span class="muted">socket connected</span>'));
socket.on('system', data=>chatLine(`<span class="muted">${escapeHtml(data.msg || '')}</span>`));
socket.on('channel_msg', data=>chatLine(`<strong>${escapeHtml(data.from)}</strong>: ${escapeHtml(data.msg)} <span class="muted">${escapeHtml(data.ts || '')}</span>`));
socket.on('room_presence', data=>{
  if(data.channel && currentRoom && data.channel !== currentRoom) return;
  document.getElementById('roomPresence').textContent = `${(data.members || []).length} members`;
});
socket.on('room_history', data=>{
  if(data.channel && currentRoom && data.channel !== currentRoom) return;
  const el = document.getElementById('chatLog');
  el.innerHTML = '';
  (data.messages || []).forEach(m=>chatLine(`<strong>${escapeHtml(m.from)}</strong>: ${escapeHtml(m.msg)} <span class="muted">${escapeHtml(m.ts || '')}</span>`));
});
document.getElementById('joinRoom').addEventListener('click', ()=>{
  const room = (document.getElementById('roomInput').value || '').trim();
  if(!room) return;
  if(currentRoom) socket.emit('leave_channel', {channel: currentRoom});
  currentRoom = room;
  socket.emit('join_channel', {channel: room});
  socket.emit('room_state', {channel: room});
  chatLine(`<span class="muted">joined ${escapeHtml(room)}</span>`);
});
document.getElementById('sendMsg').addEventListener('click', ()=>{
  const msg = (document.getElementById('chatMsg').value || '').trim();
  if(!msg || !currentRoom) return;
  socket.emit('channel_msg', {channel: currentRoom, msg});
  document.getElementById('chatMsg').value = '';
});

document.getElementById('logoutLink').addEventListener('click', async (ev)=>{
  ev.preventDefault();
  try{ await apiFetch('/api/auth/logout',{method:'POST'});}catch(e){}
  location.href = '/login';
});

(async function boot(){
  setupSidebarSections();
  const me = await checkAuthOrRedirect();
  if(!me) return;
  graph.resetGraph();
  await autoRegisterDevice();
  await fetchDevices();
  await pullAnalytics();
  setInterval(fetchDevices, 12000);
  setInterval(pullAnalytics, 8000);
  setUiStatus(`Signed in as ${me.username}.`);
})();
</script>
</body>
